name: Build mods

on:
  workflow_call:
    inputs:
      publish_mode:
        description: "'artifact' for CI workflow-artifact, 'release' for GitHub release"
        required: true
        type: string
      artifact_name:
        description: "Artifact name prefix when publish_mode is 'artifact'"
        required: false
        type: string
        default: ""
      tag:
        description: "Release tag to embed in release zip filenames"
        required: false
        type: string
        default: ""

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-x64
          - linux-x64
          - linux-arm64
        include:
          - platform: windows-x64
            runner: windows-latest
            sdk_subdir: win-amd64

          - platform: linux-x64
            runner: ubuntu-latest
            sdk_subdir: linux-amd64

          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            sdk_subdir: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux-x64' || matrix.platform == 'linux-arm64'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y ninja-build
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 200
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 200

      - name: Install LLVM, CMake, Ninja (Windows)
        if: matrix.platform == 'windows-x64'
        run: choco install llvm cmake ninja -y

      - name: Set up sccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          variant: sccache
          key: ${{ matrix.platform }}

      - name: Download SDK
        shell: bash
        run: python scripts/download-sdk.py "sdk/${{ matrix.sdk_subdir }}" --pinned --platform ${{ matrix.sdk_subdir }}

      - name: Build mods
        shell: bash
        run: python scripts/make_mods.py --target ${{ matrix.platform }} --sdk-dir sdk

      # Raw, per-platform build output, not zipped yet. The `package` job
      # below downloads all three platforms' raw output and merges them so
      # each mod ends up in a single zip with all three platforms' binaries
      # under code/<platform>/
      - name: Upload raw build output
        uses: actions/upload-artifact@v4
        with:
          name: raw-mods-${{ matrix.platform }}
          path: mods/
          if-no-files-found: error

      - name: sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true

  package:
    name: Package (one zip per mod)
    needs: build
    runs-on: ubuntu-latest
    outputs:
      mods: ${{ steps.merge.outputs.mods }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download raw build output
        uses: actions/download-artifact@v4
        with:
          pattern: raw-mods-*
          path: raw

      - name: Merge platforms and zip each mod
        id: merge
        shell: bash
        run: |
          if [ "${{ inputs.publish_mode }}" = "artifact" ]; then
            prefix="${{ inputs.artifact_name }}-"
          else
            prefix="nocturnerecomp-mods-${{ inputs.tag }}-"
          fi
          python scripts/merge_and_package.py \
            --input raw/raw-mods-windows-x64 \
            --input raw/raw-mods-linux-x64 \
            --input raw/raw-mods-linux-arm64 \
            --output pkg \
            --prefix "$prefix" \
            --write-mod-list mods.json
          echo "mods=$(cat mods.json)" >> "$GITHUB_OUTPUT"

      # A temporary staging artifact so the per-mod matrix job below (which
      # runs in fresh runners) can get at pkg/*.zip. Deleted by the cleanup
      # job once every per-mod artifact has been split out of it.
      - name: Upload staging artifact
        if: inputs.publish_mode == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: pkg-staging-${{ github.run_id }}
          path: pkg/
          if-no-files-found: error
          retention-days: 1

      - name: Upload release artifact
        if: inputs.publish_mode == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-mods
          path: pkg/
          if-no-files-found: error

  publish-per-mod:
    name: Publish artifact (${{ matrix.mod }})
    needs: package
    if: inputs.publish_mode == 'artifact'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mod: ${{ fromJson(needs.package.outputs.mods) }}
    steps:
      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: pkg-staging-${{ github.run_id }}
          path: pkg

      - name: Upload ${{ matrix.mod }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.mod }}
          path: pkg/${{ inputs.artifact_name }}-${{ matrix.mod }}.zip
          if-no-files-found: error

  cleanup:
    name: Remove intermediate artifacts
    needs: [build, package, publish-per-mod]
    if: always() && inputs.publish_mode == 'artifact' && needs.publish-per-mod.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete raw per-platform and staging artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ids=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --paginate \
            --jq '.artifacts[] | select(.name | startswith("raw-mods-") or startswith("pkg-staging-")) | .id')
          for id in $ids; do
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
          done
